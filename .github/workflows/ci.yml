name: ci

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore SchemaForge.slnx

      - name: Build
        run: dotnet build SchemaForge.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test SchemaForge.slnx --configuration Release --no-build
